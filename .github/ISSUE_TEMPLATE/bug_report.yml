name: Bug Report
description: Report a bug in aid
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `aid --version`"
      placeholder: "aid 8.39.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: What actually happened? Include relevant output, logs, or screenshots.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: How can we reproduce this?
      placeholder: |
        1. Run `aid batch ...`
        2. Wait for tasks to complete
        3. Observe PEND tasks stuck
    validations:
      required: false

  - type: textarea
    id: workaround
    attributes:
      label: Workaround
      description: Any workaround you found?
    validations:
      required: false
