name: Feature Request
description: Suggest an improvement or new feature
labels: ["enhancement"]
body:
  - type: input
    id: version
    attributes:
      label: Version
      description: "Output of `aid --version`"
      placeholder: "aid 8.39.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like aid to do?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried?
    validations:
      required: false
