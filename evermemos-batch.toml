[[task]]
name = "evermemos-client"
prompt = """
Create a new file `src/evermemos.rs` — an HTTP client for the EverMemOS memory cloud API.

## EverMemOS API Reference

Base URL: configurable (default: http://localhost:1995/api/v1)

### POST /memories
Store a memory. Request body (JSON):
```json
{
  "message_id": "unique-id",
  "create_time": "2024-01-01T00:00:00Z",
  "sender": "agent",
  "content": "The auth module uses bcrypt for hashing",
  "group_id": "optional-group",
  "metadata": {"task_id": "t-1234", "agent": "codex", "project": "/path/to/repo"}
}
```
Response: 200 OK with `{"status": "ok"}`

### GET /memories/search
Search memories. Query params as JSON body:
```json
{
  "query": "auth hashing",
  "user_id": "aid-user",
  "memory_types": ["episodic"],
  "retrieve_method": "hybrid",
  "top_k": 10
}
```
Response: `{"memories": [{"content": "...", "score": 0.95, "metadata": {...}}]}`

### GET /health
Health check. Response: `{"status": "healthy"}`

## Implementation Requirements

1. File header comment (purpose, exports, deps)
2. Use `ureq` for HTTP (already in Cargo.toml dependencies)
3. Use `serde` / `serde_json` for serialization (already in deps)

### Struct: `EverMemosClient`
```rust
pub struct EverMemosClient {
    base_url: String,
    api_key: Option<String>,
    user_id: String,
}
```

### Methods to implement:
- `pub fn new(base_url: &str, api_key: Option<&str>, user_id: &str) -> Self`
- `pub fn health_check(&self) -> Result<bool>` — GET /health, return true if healthy
- `pub fn store_memory(&self, content: &str, metadata: &MemoryMetadata) -> Result<()>` — POST /memories
- `pub fn search_memories(&self, query: &str, top_k: usize) -> Result<Vec<CloudMemory>>` — GET /memories/search with hybrid retrieval
- `pub fn from_config(config: &EverMemosConfig) -> Option<Self>` — create client from config, return None if disabled

### Types to define:
```rust
#[derive(Debug, Clone, Serialize)]
pub struct MemoryMetadata {
    pub task_id: Option<String>,
    pub agent: Option<String>,
    pub project: Option<String>,
    pub memory_type: String,
}

#[derive(Debug, Clone, Deserialize)]
pub struct CloudMemory {
    pub content: String,
    pub score: f64,
    pub metadata: serde_json::Value,
}

#[derive(Debug, Clone, Default, Deserialize)]
pub struct EverMemosConfig {
    #[serde(default)]
    pub enabled: bool,
    #[serde(default = "default_base_url")]
    pub base_url: String,
    pub api_key: Option<String>,
    #[serde(default = "default_user_id")]
    pub user_id: String,
}

fn default_base_url() -> String { "http://localhost:1995/api/v1".to_string() }
fn default_user_id() -> String { "aid-user".to_string() }
```

### Error handling:
- Use `anyhow::Result` for all public methods
- Log errors to stderr with `[aid] EverMemOS: ...` prefix
- Don't panic on API errors — return Err or log and continue

### Important:
- Keep the file under 200 lines
- No unnecessary dependencies — only use ureq, serde, serde_json, anyhow (all already in Cargo.toml)
- Make the client Send + Sync safe (no interior mutability needed — ureq::Agent is cloneable)
- Use `ureq` v3 API (the version in Cargo.toml) — note: ureq v3 uses `ureq::Agent::new()`, `.get(url).call()`, `.post(url).send_json(body)`, and response body is read via `.into_body().read_json::<T>()`
"""
worktree = "feat/evermemos-client"

