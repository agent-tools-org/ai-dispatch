Create a README.md file for the EverMemOS + aid integration — this is a hackathon competition submission for the AIMemory Genesis 2026 competition (Track 2: Platform Plugins).

Write a compelling, well-structured README.md at the project root.

## Project: aid × EverMemOS — Multi-Agent Dev Team with Cloud Memory

### What it does:
aid is a multi-AI CLI team orchestrator that dispatches tasks to AI coding agents (Codex, Gemini, OpenCode, Cursor). The EverMemOS integration adds **cloud-backed semantic memory** so agents can:
1. **Remember** — after each task, key learnings are stored in EverMemOS
2. **Recall** — before each task, relevant memories are retrieved via semantic search and injected into the agent's prompt
3. **Share** — memories persist across sessions, machines, and agents
4. **Evolve** — EverMemOS consolidates episodic traces into stable knowledge over time

### Architecture:
```
┌─────────────────────────────────────┐
│         aid orchestrator            │
│  (plan → dispatch → review → learn) │
└──────┬──────────────┬───────────────┘
       │              │
  ┌────▼────┐    ┌────▼────┐
  │ Dispatch │    │ Extract  │
  │ (inject  │    │ (task    │
  │  memory) │    │  result  │
  └────┬────┘    │  → mem)  │
       │         └────┬────┘
       │              │
  ┌────▼──────────────▼────┐
  │      EverMemOS API      │
  │  (store / search / evolve) │
  └────────────────────────┘
       │
  ┌────▼────┐  ┌────▼────┐  ┌────▼────┐
  │  codex  │  │ gemini  │  │opencode │
  └─────────┘  └─────────┘  └─────────┘
```

### Key features:
- **Dual memory**: local SQLite (fast, offline) + EverMemOS cloud (semantic, persistent)
- **Automatic injection**: cloud memories are injected into every agent dispatch
- **CLI management**: `aid memory cloud-status`, `aid memory cloud-search`, `aid memory cloud-push`
- **Zero config default**: works without EverMemOS (falls back to local only); add `[evermemos]` config to enable cloud

### Setup:
1. Run EverMemOS locally: `docker compose up -d` (from EverMemOS repo)
2. Configure aid: add `[evermemos]` section to `~/.aid/config.toml`
3. Verify: `aid memory cloud-status`

### Config example:
```toml
[evermemos]
enabled = true
base_url = "http://localhost:1995/api/v1"
user_id = "my-dev-team"
# api_key = "optional-for-cloud"
```

### Demo scenario:
1. Agent A fixes a bug and discovers a code pattern → stored in EverMemOS
2. Next day, Agent B gets a related task → EverMemOS semantic search finds Agent A's discovery → injected into prompt
3. Agent B produces consistent, informed code without being told about the pattern

### Tech stack:
- aid: Rust CLI orchestrator (v7.4)
- EverMemOS: Python-based memory OS with Milvus, Elasticsearch, MongoDB, Redis
- Integration: REST API via ureq HTTP client

### Competition track:
Track 2: Platform Plugins — Integrating EverMemOS into a developer tool (AI CLI orchestrator)

### Links:
- aid GitHub: https://github.com/agent-tools-org/ai-dispatch
- EverMemOS: https://github.com/EverMind-AI/EverMemOS
- Competition: AIMemory Genesis 2026

