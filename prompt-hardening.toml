# Prompt injection hardening — 4 fixes for cross-task pollution vectors

[defaults]
agent = "codex"
verify = "cargo test"
dir = "."

[[tasks]]
id = "like-escape"
prompt = '''
In src/store/queries.rs, the `search_memories` function builds a LIKE pattern with:
```rust
let pattern = format!("%{}%", query);
```
This allows SQL LIKE wildcards (% and _) in the query to affect matching.

Fix: escape % and _ in the query before wrapping. Add a helper function `escape_like(query: &str) -> String` that replaces literal `%` with `\%` and `_` with `\_`, and add `ESCAPE '\'` to the LIKE clause.

The fix should be:
1. Add `fn escape_like(s: &str) -> String` that does: s.replace('%', r"\%").replace('_', r"\_")
2. Change the pattern line to: `let pattern = format!("%{}%", escape_like(query));`
3. Update the SQL to: `WHERE content LIKE ?1 ESCAPE '\'`
4. Add a unit test `search_memories_escapes_wildcards` that inserts a memory with content "100% success rate" and verifies that searching for "100%" matches it but "100" alone also matches via the surrounding %%.

Only modify src/store/queries.rs. Minimal change.
'''

[[tasks]]
id = "context-fence"
prompt = '''
In src/cmd/prompt_context.rs, the `resolve_context_from` function (line ~241) injects raw output from prior tasks into new prompts without any sanitization fence.

Fix: wrap the injected content in a clearly-marked untrusted boundary. Change the block format from:
```rust
blocks.push(format!(
    "[Prior Task Result — {} ({}, {})]\n{}",
    task_id, task.agent_display_name(), task.status.as_str(), content.trim()
));
```
to:
```rust
blocks.push(format!(
    "[Prior Task Result — {} ({}, {})]\n<prior-task-output task=\"{}\">\n{}\n</prior-task-output>",
    task_id, task.agent_display_name(), task.status.as_str(), task_id, content.trim()
));
```

Also add a sanitization step before injection: strip any lines from `content` that start with `<aid-` or `</aid-` (our structural prompt tags) to prevent tag spoofing. Add a helper `fn sanitize_injected_content(content: &str) -> String` that filters these lines.

Add tests:
1. `sanitize_strips_aid_tags` — input with `<aid-project-rules>` lines gets them removed
2. `sanitize_preserves_normal_content` — normal code/text passes through unchanged
3. `resolve_context_from_wraps_in_fence` — verify the output contains `<prior-task-output` wrapper

Only modify src/cmd/prompt_context.rs.
'''

[[tasks]]
id = "finding-limit"
prompt = '''
In src/workgroup.rs, the `compose_prompt` function injects findings into the prompt without any content length limit. Individual findings could be arbitrarily long.

Fix: truncate each finding's content to 500 characters max before injection. In the finding_lines construction (around line 30), change:
```rust
format!("- [{source}] {}", f.content)
```
to:
```rust
let content = if f.content.len() > 500 {
    let safe = f.content.floor_char_boundary(497);
    format!("{}...", &f.content[..safe])
} else {
    f.content.clone()
};
format!("- [{source}] {content}")
```

Also do the same for milestones (around line 40):
```rust
let detail = if detail.len() > 500 {
    let safe = detail.floor_char_boundary(497);
    format!("{}...", &detail[..safe])
} else {
    detail.clone()
};
format!("- [{task_id}] {detail}")
```

Add tests:
1. `finding_content_truncated_at_500` — a finding with 1000 chars gets truncated with "..."
2. `milestone_content_truncated_at_500` — same for milestones
3. `short_finding_unchanged` — findings under 500 chars pass through

Only modify src/workgroup.rs.
'''

[[tasks]]
id = "section-fence"
prompt = '''
In src/cmd/run_prompt.rs, the `build_prompt_bundle` function concatenates multiple injected sections (memories, knowledge, rules, summaries, context-from, findings) using plain newline separators. This means injected content from one section could spoof markers from another section.

Fix: Add a sanitizer that strips spoofed structural markers from injected content.

1. Add `fn sanitize_injected_text(text: &str) -> String` in run_prompt.rs that strips lines matching `^<aid-` or `^</aid-` from any text before it gets format!() into the prompt. Implementation:
```rust
fn sanitize_injected_text(text: &str) -> String {
    text.lines()
        .filter(|line| {
            let trimmed = line.trim_start();
            !trimmed.starts_with("<aid-") && !trimmed.starts_with("</aid-")
        })
        .collect::<Vec<_>>()
        .join("\n")
}
```

2. Apply this sanitizer to these injected blocks in build_prompt_bundle:
   - The `memory_block` returned by `inject_memories` (around line 73): `let memory_block = sanitize_injected_text(&memory_block);`
   - The `knowledge_block` from `format_knowledge_block` (around lines 99, 141): wrap each
   - The sibling summaries block (around line 64): wrap

3. Add test `sanitize_strips_structural_tags` that verifies `<aid-project-rules>` and `</aid-team-rules>` lines are removed
4. Add test `sanitize_preserves_normal_lines` that verifies normal text passes through

Only modify src/cmd/run_prompt.rs. Keep the function simple.
'''
