[[task]]
name = "test-retry-logic"
agent = "opencode"
skills = ["implementer", "test-writer"]
prompt = """
Add tests for the retry logic in src/cmd/retry_logic.rs.

EXISTING CODE: src/cmd/retry_logic.rs has these functions:
- prepare_retry(store, task_id, args) -> Result<Option<RunArgs>> — returns retry args or None
- read_stderr_tail(task_id, lines) -> String — reads last N lines of stderr file
- retry_depth(store, parent_task_id) -> Result<u32> — walks parent chain
- backoff_for_attempt(attempt) -> u64 — returns backoff seconds
- root_prompt(store, task) -> Option<String> — finds original prompt via parent chain

There are already 2 basic tests (backoff_for_attempt_increases, retry_depth_is_zero_without_parent).

ADD these tests to the existing #[cfg(test)] block in src/cmd/retry_logic.rs:

1. test_retry_depth_with_chain:
   - Create 3 tasks in Store::open_memory(): t-root (no parent), t-r1 (parent=t-root), t-r2 (parent=t-r1)
   - Assert retry_depth(store, Some("t-r1")) == 1
   - Assert retry_depth(store, Some("t-r2")) == 2

2. test_root_prompt_walks_chain:
   - Create 3 tasks: root prompt="original", r1 prompt="retry1" parent=root, r2 prompt="retry2" parent=r1
   - Call root_prompt(store, &r2_task)
   - Assert result == Some("original")

3. test_backoff_capped:
   - Assert backoff_for_attempt(10) == backoff_for_attempt(3) (capped at max value)

CONSTRAINTS:
- Only modify src/cmd/retry_logic.rs
- Use Store::open_memory() for in-memory DB
- Reuse the existing task() helper function in the test module
- cargo check and cargo test must pass
"""
dir = "."
worktree = "test/retry-logic"
verify = "auto"

