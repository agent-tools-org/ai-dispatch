   ```rust
   pub fn run(task_id: &str, input: Option<&str>, file: Option<&str>) -> Result<()> {
       let text = if let Some(path) = file {
           std::fs::read_to_string(path)
               .with_context(|| format!("Failed to read response file: {path}"))?
       } else if let Some(text) = input {
