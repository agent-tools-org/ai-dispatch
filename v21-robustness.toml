   ```rust
   pub fn output_text(store: &Arc<Store>, task_id: &str) -> Result<String> {
       let task = load_task(store, task_id)?;
       if let Ok(content) = read_task_output(&task) {
           return Ok(content);
       }
       // Fallback: show log tail
