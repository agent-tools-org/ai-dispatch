   ```rust
   use anyhow::{Result, anyhow};
   use std::sync::Arc;
   use crate::store::Store;
   use crate::types::TaskStatus;

   pub fn run(store: Arc<Store>, task_id: &str) -> Result<()> {
       let task = store.get_task(task_id)?
           .ok_or_else(|| anyhow!("Task '{task_id}' not found"))?;
