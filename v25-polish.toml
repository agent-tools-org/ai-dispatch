# v2.5 — Polish & Reliability
# Fix token extraction for OpenCode and Cursor agents, strengthen scope enforcement

[[task]]
agent = "codex"
prompt = """Fix OpenCode token extraction in src/agent/opencode.rs.

TWO changes needed:

1. In `build_command`, add `--format json` so OpenCode emits JSONL events:
   After `cmd.arg("run");` and before model/dir/prompt args, add:
   ```
   cmd.args(["--format", "json"]);
   ```

2. In `parse_json_event`, add handling for the `step_finish` event type.
   OpenCode emits this JSON when a step completes:
   ```json
   {"type":"step_finish","part":{"tokens":{"total":16125,"input":14040,"output":2,"reasoning":0},"cost":0}}
   ```

   Add a match arm for `"step_finish"`:
   - Extract tokens from `v.pointer("/part/tokens/total")` as i64
   - Extract input_tokens from `v.pointer("/part/tokens/input")` as i64
   - Extract output_tokens from `v.pointer("/part/tokens/output")` as i64
   - Extract cost from `v.pointer("/part/cost")` as f64
   - Return EventKind::Completion event with metadata:
     `json!({"tokens": total, "input_tokens": input, "output_tokens": output, "cost_usd": cost})`
   - Detail string: `format!("tokens: {} in + {} out = {}", input, output, total)`

   Also handle `"step_start"` → return None (skip it, noise)
   Also handle `"text"` → extract `v.pointer("/part/text")` as Reasoning event

3. Add a test `parses_step_finish_token_event` that verifies the step_finish parsing.

IMPORTANT: Do NOT modify any other files. Only touch src/agent/opencode.rs."""
worktree = "v25-opencode-tokens"
verify = "auto"
context = ["src/agent/opencode.rs", "src/watcher.rs:apply_completion_event", "src/agent/codex.rs:parse_turn_completed"]

[[task]]
agent = "codex"
prompt = """Fix Cursor Agent token extraction in src/agent/cursor.rs.

Cursor Agent supports `--output-format stream-json` which outputs JSONL events:

1. System init: `{"type":"system","subtype":"init","model":"Claude 4.6 Opus (Thinking)",...}`
2. Assistant messages: `{"type":"assistant","message":{"role":"assistant","content":[{"type":"text","text":"Hello!"}]},...}`
3. Final result: `{"type":"result","subtype":"success","duration_ms":8549,"result":"Hello!","usage":{"inputTokens":3,"outputTokens":5,"cacheReadTokens":12260,"cacheWriteTokens":2896},...}`

THREE changes needed:

1. In `build_command`, add `--output-format stream-json`:
   Change the args line to:
   ```rust
   cmd.args(["agent", "-p", prompt, "--trust", "--output-format", "stream-json"]);
   ```

2. Rewrite `parse_event` to try JSON parsing first, falling back to text classification:
   ```rust
   fn parse_event(&self, task_id: &TaskId, line: &str) -> Option<TaskEvent> {
       let trimmed = line.trim();
       if trimmed.is_empty() { return None; }
       let now = Local::now();
       // Try JSON first
       if let Ok(v) = serde_json::from_str::<serde_json::Value>(trimmed) {
           return parse_json_event(task_id, &v, now);
       }
       // Fallback to text classification
       let (kind, detail) = classify_line(trimmed);
       kind.map(|k| TaskEvent { ... })
   }
   ```

3. Add a `parse_json_event` function that handles:
   - `"system"` type → extract model from `v["model"]`, return Reasoning event with detail like "init: {model}"
   - `"assistant"` type → extract text from `v.pointer("/message/content/0/text")`, return Reasoning event
   - `"result"` type → extract usage data:
     - inputTokens = `v.pointer("/usage/inputTokens")` as i64 (default 0)
     - outputTokens = `v.pointer("/usage/outputTokens")` as i64 (default 0)
     - cacheReadTokens = `v.pointer("/usage/cacheReadTokens")` as i64 (default 0)
     - total = inputTokens + outputTokens + cacheReadTokens
     - Return EventKind::Completion with metadata: `json!({"tokens": total, "input_tokens": inputTokens, "output_tokens": outputTokens})`
     - Detail: `format!("tokens: {} in + {} out = {} ({} cached)", inputTokens, outputTokens, total, cacheReadTokens)`
   - Other types → return None

Add imports: `use serde_json::json;`

4. Add tests:
   - `parses_result_event_with_usage` — verify token extraction from result JSON
   - `parses_assistant_message` — verify text extraction

IMPORTANT: Do NOT modify any other files. Only touch src/agent/cursor.rs."""
worktree = "v25-cursor-tokens"
verify = "auto"
context = ["src/agent/cursor.rs", "src/watcher.rs:apply_completion_event", "src/agent/opencode.rs:parse_json_event"]

[[task]]
agent = "codex"
prompt = """Strengthen the implementer skill to prevent agents from editing too many files.

Edit ONLY the file `default-skills/implementer.md`.

Add a new section `## Scope Discipline` after the `## Method` section (before `## Progress Milestones`):

```markdown
## Scope Discipline

- If the task mentions specific files, ONLY modify those files. Do NOT touch other files.
- If no files are specified, identify the minimal set of files that need changes. Before editing, list them and confirm the list is minimal.
- NEVER modify more than 5 files unless the task explicitly requires it.
- NEVER edit README.md, CHANGELOG.md, or documentation files unless the task specifically asks for documentation changes.
- If you find yourself wanting to "improve" adjacent code — STOP. That is out of scope.
- Each file you modify must be directly justified by the task description.
```

IMPORTANT: Do NOT modify any other files. Only touch default-skills/implementer.md."""
worktree = "v25-scope-enforcement"
verify = "auto"
context = ["default-skills/implementer.md"]
