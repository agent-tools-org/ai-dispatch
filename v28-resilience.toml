[[task]]
agent = "opencode"
prompt = """Add worktree cleanup on fast fail: when a task fails in under 10 seconds and has no meaningful commits, automatically remove the worktree.

## Changes to src/cmd/run.rs

After the foreground agent process completes (after `run_agent_process`), add a cleanup check. This should go after the `maybe_verify` call and before the `notify_task_completion` call.

Add a new function `maybe_cleanup_fast_fail`:
```rust
fn maybe_cleanup_fast_fail(store: &Store, task_id: &TaskId, task: &Task) {
    let Some(ref wt_path) = task.worktree_path else { return };
    let path = std::path::Path::new(wt_path);
    if !path.exists() { return }

    // Only cleanup if task failed
    let Some(task) = store.get_task(task_id.as_str()).ok().flatten() else { return };
    if task.status != TaskStatus::Failed { return }

    // Only cleanup fast failures (< 10 seconds)
    let Some(duration_ms) = task.duration_ms else { return };
    if duration_ms > 10_000 { return }

    // Only cleanup if no commits ahead of main
    if crate::worktree::branch_has_commits_ahead_of_main(
        path, task.worktree_branch.as_deref().unwrap_or("unknown")
    ).unwrap_or(true) {
        return;
    }

    // Safe to cleanup
    let _ = std::process::Command::new("git")
        .args(["worktree", "remove", "--force", wt_path])
        .output();
    eprintln!("[aid] Cleaned up worktree for fast-failed task {}", task_id);
}
```

Call it from the foreground run path, right after `maybe_verify`:
```rust
if let Some(task) = store.get_task(task_id.as_str())? {
    maybe_cleanup_fast_fail(&store, &task_id, &task);
}
```

## Changes to src/background.rs

In `run_task_inner`, add the same cleanup after `maybe_verify`. Get the task from store and call the function:
```rust
if let Some(task) = store.get_task(&spec.task_id)? {
    crate::cmd::run::maybe_cleanup_fast_fail(store, &TaskId(spec.task_id.clone()), &task);
}
```

Make sure to make `maybe_cleanup_fast_fail` pub(crate) so background.rs can call it.

IMPORTANT: Only modify src/cmd/run.rs and src/background.rs. Do NOT touch other files."""
worktree = "v28-wt-cleanup"
verify = "auto"
context = ["src/cmd/run.rs:run,run_agent_process,maybe_verify", "src/background.rs:run_task_inner", "src/worktree.rs:branch_has_commits_ahead_of_main", "src/types.rs:Task,TaskStatus"]

[[task]]
agent = "opencode"
prompt = """Copy Cargo.lock into worktrees after creation to avoid redundant dependency resolution.

## Changes to src/worktree.rs

After each successful `create_worktree` return path (there are two: the new-branch path and the existing-branch fallback), copy Cargo.lock from the repo_dir into the worktree if it exists:

Add a helper function:
```rust
fn sync_cargo_lock(repo_dir: &Path, wt_path: &Path) {
    let src = repo_dir.join("Cargo.lock");
    let dst = wt_path.join("Cargo.lock");
    if src.exists() && !dst.exists() {
        let _ = std::fs::copy(&src, &dst);
    }
}
```

Call `sync_cargo_lock(repo_dir, &wt_path)` right before each `Ok(WorktreeInfo { ... })` return. There are 3 return points:
1. Line ~30: early return when wt_path already exists — call sync_cargo_lock before return
2. Line ~45: new branch success — call sync_cargo_lock before return
3. Line ~73: fallback existing branch success — call sync_cargo_lock before return

Add a test:
```rust
#[test]
fn create_worktree_syncs_cargo_lock() {
    let repo = TempDir::new().unwrap();
    git(repo.path(), &["init", "-b", "main"]);
    git(repo.path(), &["config", "user.email", "test@example.com"]);
    git(repo.path(), &["config", "user.name", "Test User"]);
    std::fs::write(repo.path().join("file.txt"), "hello\n").unwrap();
    std::fs::write(repo.path().join("Cargo.lock"), "# lock content\n").unwrap();
    git(repo.path(), &["add", "."]);
    git(repo.path(), &["commit", "-m", "init"]);

    let branch = unique_branch("cargo-lock-test");
    let info = create_worktree(repo.path(), branch.as_str(), None).unwrap();
    assert!(info.path.join("Cargo.lock").exists());

    git(repo.path(), &["worktree", "remove", "--force", &info.path.to_string_lossy()]);
}
```

IMPORTANT: Only modify src/worktree.rs. Do NOT touch other files."""
worktree = "v28-cargo-lock"
verify = "auto"
context = ["src/worktree.rs"]

[[task]]
agent = "opencode"
prompt = """Add a text-edit prompt guard: when the prompt contains references to non-code files (.md, .txt, .toml, .yaml, .yml, .json, .cfg, .ini), prepend a guard instruction to prevent full file rewrites.

## Changes to src/templates.rs

Add a new function `text_edit_guard`:
```rust
pub fn text_edit_guard(prompt: &str) -> Option<&'static str> {
    let text_extensions = [".md", ".txt", ".toml", ".yaml", ".yml", ".json", ".cfg", ".ini", ".csv"];
    let lower = prompt.to_lowercase();
    if text_extensions.iter().any(|ext| lower.contains(ext)) {
        Some("\nIMPORTANT: When editing text/config files, make targeted edits only. Do NOT rewrite or regenerate entire files. Preserve existing content and structure.\n")
    } else {
        None
    }
}
```

## Changes to src/cmd/run.rs

After the milestone prompt injection (line ~202 `effective_prompt = templates::inject_milestone_prompt(...)`), add:
```rust
if let Some(guard) = templates::text_edit_guard(&effective_prompt) {
    effective_prompt = format!("{guard}{effective_prompt}");
}
```

## Tests in src/templates.rs

Add tests:
```rust
#[test]
fn text_edit_guard_triggers_for_md_files() {
    assert!(text_edit_guard("Edit README.md to add a section").is_some());
}

#[test]
fn text_edit_guard_does_not_trigger_for_code() {
    assert!(text_edit_guard("Refactor the login function in auth.rs").is_none());
}

#[test]
fn text_edit_guard_triggers_for_toml() {
    assert!(text_edit_guard("Update Cargo.toml version").is_some());
}
```

IMPORTANT: Only modify src/templates.rs and src/cmd/run.rs. Do NOT touch other files."""
worktree = "v28-text-guard"
verify = "auto"
context = ["src/templates.rs", "src/cmd/run.rs:run"]

