# v2.9 — Re-dispatch with opencode (codex quota exhausted)

[[task]]
agent = "opencode"
prompt = """
## Task: OpenCode --file context injection

When `aid run opencode` is used with `--context`, pass context file paths to OpenCode via its native `-f` (--file) flag instead of embedding resolved file content in the prompt. This saves tokens because OpenCode reads files itself.

### Changes required:

1. **src/agent/mod.rs** — Add `context_files: Vec<String>` to the `RunOpts` struct (default empty vec).

2. **src/agent/opencode.rs** — In `build_command()`, iterate over `opts.context_files` and add `-f <path>` args for each file. Insert the `-f` flags before the prompt argument.

3. **src/cmd/run.rs** — When the agent is OpenCode and context specs are provided:
   - Extract the file paths from the parsed context specs (the `path` field of each `ContextSpec`)
   - Pass them via `RunOpts.context_files`
   - Still embed the symbol filter hints in the prompt (e.g. "Focus on: TaskId, TaskStatus in types.rs") if symbol filters are specified
   - For non-OpenCode agents, keep the current behavior (embed full resolved content in prompt)

   The key change is in the section around lines 175-180 where `file_context` is built. For OpenCode, instead of resolving full content, extract paths and pass through RunOpts, and only embed a brief hint if symbols are specified.

4. **src/context.rs** — Check the `ContextSpec` struct to ensure the raw file path is accessible. It should already have a `path` field.

### Constraints:
- Do NOT change behavior for non-OpenCode agents (codex, gemini, cursor)
- Do NOT remove the existing context resolution logic — it's still needed for other agents and for symbol-filtered specs
- Add a unit test in opencode.rs verifying that `-f` flags appear in the built command when context_files are provided
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-opencode-file"
verify = "auto"

[[task]]
agent = "opencode"
prompt = """
## Task: OpenCode --session retry (session continuity)

When retrying an OpenCode task, pass `--session <id>` so the agent retains its previous conversation context. This avoids re-reading files and re-discovering the codebase.

### Background:
OpenCode emits a `sessionID` field in every JSON event during `opencode run --format json`. Example:
```json
{"type":"step_start","sessionID":"ses_31945f5cbffec3wq2KJYU3vUce",...}
```

OpenCode's `run` command accepts `--session <id>` and `--continue` flags to resume a session.

### Changes required:

1. **src/types.rs** — Add `agent_session_id: Option<String>` to the `Task` struct, after `caller_session_id`.

2. **src/store.rs** —
   - Add migration: `ALTER TABLE tasks ADD COLUMN agent_session_id TEXT;`
   - Add `update_agent_session_id(task_id, session_id)` method
   - Include `agent_session_id` in `insert_task` and `row_to_task` (the SELECT mapping). The row_to_task function reads columns by index — make sure to add the new column at the right position and update all index numbers.

3. **src/agent/opencode.rs** —
   - In `parse_json_event()`, extract `sessionID` from any JSON event. Include it in the event metadata as `"agent_session_id"`.

4. **src/watcher.rs** — In `handle_streaming_line`, after parsing an event, if the event metadata contains `agent_session_id`, call `store.update_agent_session_id()` to persist it. Use a flag to do this only once.

5. **src/agent/mod.rs** — Add `session_id: Option<String>` to `RunOpts`.

6. **src/agent/opencode.rs:build_command** — If `opts.session_id` is Some, add `--session <id> --continue` flags before the prompt.

7. **src/cmd/retry.rs** — When building RunArgs for retry, if the original task has `agent_session_id` and the agent is OpenCode, set `session_id: task.agent_session_id.clone()` in RunArgs.

8. **src/cmd/run.rs** — Add `session_id: Option<String>` to RunArgs struct. Wire `args.session_id` into `RunOpts { session_id: args.session_id.clone(), .. }`.

9. **src/main.rs** — Add `session_id: None` to RunArgs in Commands::Run handler.

### Constraints:
- Only OpenCode uses session continuity. Other agents should ignore the field.
- Add a test in opencode.rs that verifies `--session` and `--continue` flags appear when session_id is provided in RunOpts.
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-opencode-session"
verify = "auto"

[[task]]
agent = "opencode"
prompt = """
## Task: Fix AWAIT reason showing wrong content

### Bug:
When a background task enters AWAIT state (waiting for user input), `aid board` shows code snippets instead of the agent's actual question. For example, it shows "115:    use super::board::render_board;" instead of "Should I update board.rs?".

### Root cause:
In `src/pty_watch.rs`, the `extract_awaiting_prompt()` function (line 230) searches the last 6 non-empty lines of full output for a line ending with `?` or `(y/n)`. Problems:
1. Output often contains ANSI escape codes that prevent matching
2. Only 6 lines is too few — the question may be further back
3. Only `?` and `(y/n)` patterns are too narrow — agents ask questions in many formats

### Fix:
Modify `extract_awaiting_prompt()` in `src/pty_watch.rs`:

1. **Strip ANSI escape codes** before searching. Add a helper `strip_ansi(s: &str) -> String` that removes ANSI escape sequences (ESC [ followed by digits/semicolons then a letter, where ESC is byte 0x1b). Do NOT add a regex crate dependency — use a simple manual byte-level parser.

2. **Expand search window** from 6 to 20 lines.

3. **Expand matching patterns** — match lines that:
   - End with `?` (current)
   - End with `(y/n)` or `(Y/n)` or `(yes/no)` (case variations)
   - Contain "Do you want", "Would you like", "Shall I", "Should I", "Please confirm", "Continue?"
   - Start with `>` or `?` (common prompt indicators)

4. **Priority**: prefer lines ending with `?` over other pattern matches.

### Tests:
Update the existing test `stores_recent_question_as_awaiting_prompt_metadata` in `src/pty_watch/tests.rs`.

Add new tests:
- Test with ANSI-escaped output (e.g. ESC[1mShould I proceed?ESC[0m where ESC is byte 0x1b)
- Test with question more than 6 lines back (use 15 filler lines before the question)
- Test with "Do you want to continue" (no question mark)
- Test where no question is found (should fall back to prompt)

### Constraints:
- Do NOT add any external crate dependencies
- Keep the function simple and efficient
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-await-fix"
verify = "auto"
