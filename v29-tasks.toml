# v2.9 ‚Äî OpenCode Native Integration + AWAIT bug fix

[[task]]
agent = "codex"
prompt = """
## Task: OpenCode --file context injection

When `aid run opencode` is used with `--context`, pass context file paths to OpenCode via its native `-f` (--file) flag instead of embedding resolved file content in the prompt. This saves tokens because OpenCode reads files itself.

### Changes required:

1. **src/agent/mod.rs** ‚Äî Add `context_files: Vec<String>` to the `RunOpts` struct (default empty vec).

2. **src/agent/opencode.rs** ‚Äî In `build_command()`, iterate over `opts.context_files` and add `-f <path>` args for each file. Insert the `-f` flags before the prompt argument.

3. **src/cmd/run.rs** ‚Äî When the agent is OpenCode and context specs are provided:
   - Extract the file paths from the parsed context specs (the `path` field of each `ContextSpec`)
   - Pass them via `RunOpts.context_files`
   - Still embed the symbol filter hints in the prompt (e.g. "Focus on: TaskId, TaskStatus in types.rs") if symbol filters are specified
   - For non-OpenCode agents, keep the current behavior (embed full resolved content in prompt)

   The key change is in the section around lines 175-180 where `file_context` is built. For OpenCode, instead of resolving full content, extract paths and pass through RunOpts, and only embed a brief hint if symbols are specified.

4. **src/context.rs** ‚Äî Check the `ContextSpec` struct to ensure the raw file path is accessible. It should already have a `path` field.

### Constraints:
- Do NOT change behavior for non-OpenCode agents (codex, gemini, cursor)
- Do NOT remove the existing context resolution logic ‚Äî it's still needed for other agents and for symbol-filtered specs
- Add a unit test in opencode.rs verifying that `-f` flags appear in the built command when context_files are provided
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-opencode-file"
verify = "auto"

[[task]]
agent = "codex"
prompt = """
## Task: OpenCode --session retry (session continuity)

When retrying an OpenCode task, pass `--session <id>` so the agent retains its previous conversation context. This avoids re-reading files and re-discovering the codebase.

### Background:
OpenCode emits a `sessionID` field in every JSON event during `opencode run --format json`. Example:
```json
{"type":"step_start","timestamp":1773397480807,"sessionID":"ses_31945f5cbffec3wq2KJYU3vUce",...}
```

OpenCode's `run` command accepts `--session <id>` and `--continue` flags to resume a session.

### Changes required:

1. **src/types.rs** ‚Äî Add `agent_session_id: Option<String>` to the `Task` struct, after `caller_session_id`.

2. **src/store.rs** ‚Äî
   - Add migration: `ALTER TABLE tasks ADD COLUMN agent_session_id TEXT;`
   - Add `update_agent_session_id(task_id, session_id)` method
   - Include `agent_session_id` in `insert_task` and `row_to_task` (the SELECT mapping)

3. **src/agent/opencode.rs** ‚Äî
   - In `parse_json_event()`, extract `sessionID` from any event that has it and return it via metadata key `"agent_session_id"`.
   - Actually, better approach: extract session_id in `parse_event()` wrapper level and return it in `CompletionInfo`. Add `session_id: Option<String>` to `CompletionInfo` struct.

4. **src/watcher.rs** ‚Äî In `handle_streaming_line`, when parsing events, if the event metadata contains `agent_session_id`, call `store.update_agent_session_id()` to persist it (do this only once, on first occurrence).

5. **src/agent/mod.rs** ‚Äî Add `session_id: Option<String>` to `RunOpts`. Add `session_id: Option<String>` to `CompletionInfo`.

6. **src/agent/opencode.rs:build_command** ‚Äî If `opts.session_id` is Some, add `--session <id> --continue` flags.

7. **src/cmd/retry.rs** ‚Äî When building the RunArgs for retry, if the original task has `agent_session_id` and the agent is OpenCode, pass it through to RunOpts. Actually, the session_id needs to flow through RunArgs -> RunOpts. Add `session_id: Option<String>` to RunArgs, and wire it in retry.rs: `session_id: task.agent_session_id.clone()`.

8. **src/cmd/run.rs** ‚Äî Wire `args.session_id` into `RunOpts { session_id: ... }`. Add the field to the RunArgs struct.

9. **src/main.rs** ‚Äî Add `session_id: None` to the RunArgs in all call sites (Commands::Run, etc.).

### Key constraint:
- The session_id is available in the FIRST JSON event from OpenCode. Capture it on first occurrence and persist.
- Only OpenCode uses session continuity. Other agents should ignore the field.
- Add a test in opencode.rs that verifies `--session` and `--continue` flags appear when session_id is provided in RunOpts.
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-opencode-session"
verify = "auto"

[[task]]
agent = "codex"
prompt = """
## Task: Fix AWAIT reason showing wrong content

### Bug:
When a background task enters AWAIT state (waiting for user input), `aid board` shows code snippets instead of the agent's actual question. For example, it shows "115:    use super::board::render_board;" instead of "Should I update board.rs?".

### Root cause:
In `src/pty_watch.rs`, the `extract_awaiting_prompt()` function (line 230) searches the last 6 non-empty lines of full output for a line ending with `?` or `(y/n)`. Problems:
1. Output often contains ANSI escape codes that prevent matching
2. Only 6 lines is too few ‚Äî the question may be further back
3. Only `?` and `(y/n)` patterns are too narrow ‚Äî agents ask questions in many formats

### Fix:
Modify `extract_awaiting_prompt()` in `src/pty_watch.rs`:

1. **Strip ANSI escape codes** before searching. Add a helper `strip_ansi(s: &str) -> String` that removes ANSI escape sequences (ESC [ followed by digits/semicolons then a letter). Do NOT add a regex crate dependency ‚Äî use a simple manual byte-level parser that skips ESC (0x1b) sequences.

2. **Expand search window** from 6 to 20 lines.

3. **Expand matching patterns** ‚Äî match lines that:
   - End with `?` (current)
   - End with `(y/n)` (current)
   - End with `(Y/n)` or `(yes/no)` (case variations)
   - Contain "Do you want", "Would you like", "Shall I", "Should I", "Please confirm", "Continue?"
   - Start with ">" or "?" (common prompt indicators)

4. **Priority**: prefer lines ending with `?` over other patterns (question mark is strongest signal).

### Tests:
Update the existing test `stores_recent_question_as_awaiting_prompt_metadata` in `src/pty_watch/tests.rs`.

Add new tests:
- Test with ANSI-escaped output (e.g. ESC[1mShould I proceed?ESC[0m where ESC is 0x1b)
- Test with question more than 6 lines back
- Test with "Do you want to continue" (no question mark)
- Test where no question is found (should fall back to prompt)

### Constraints:
- Do NOT add any external crate dependencies
- Keep the function simple and efficient
- Keep files concise. No unnecessary comments or docstrings.
"""
worktree = "v29-await-fix"
verify = "auto"
