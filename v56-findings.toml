CRITICAL: You must update ALL call sites of `handle_streaming_line`, `handle_streaming_line_with_session`, `watch_streaming`, `watch_buffered`, and `run_agent_process_impl` to pass the new workgroup_id parameter. Search for every usage of these functions and update them. If you miss a call site, the build will fail.

