## Store methods (src/store/mutations.rs)

Add `insert_finding`:
```rust
pub fn insert_finding(&self, workgroup_id: &str, content: &str, source_task_id: Option<&str>) -> Result<()> {
    let now = Local::now().to_rfc3339();
    self.db().execute(
        "INSERT INTO findings (workgroup_id, content, source_task_id, created_at) VALUES (?1, ?2, ?3, ?4)",
        params![workgroup_id, content, source_task_id, now],
    )?;
    Ok(())
}
```

## Store methods (src/store/queries.rs)

Add `list_findings`:
```rust
pub fn list_findings(&self, workgroup_id: &str) -> Result<Vec<Finding>> {
    let conn = self.db();
    let mut stmt = conn.prepare(
        "SELECT id, workgroup_id, content, source_task_id, created_at FROM findings WHERE workgroup_id = ?1 ORDER BY created_at ASC"
    )?;
    let rows = stmt.query_map(params![workgroup_id], |row| {
        Ok(Finding {
            id: row.get(0)?,
            workgroup_id: row.get(1)?,
            content: row.get(2)?,
            source_task_id: row.get(3)?,
            created_at: super::schema::parse_dt(&row.get::<_, String>(4)?),
        })
    })?;
    rows.map(|r| Ok(r?)).collect()
}
```

IMPORTANT: Use `super::schema::parse_dt` (not `crate::store::schema::parse_dt`). Follow existing patterns exactly. Add `use crate::types::Finding;` where needed.

