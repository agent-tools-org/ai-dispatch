[[task]]
name = "broadcast-bridge"
agent = "codex"
prompt = """
When the watcher captures a [FINDING], also append it to the workgroup's broadcast file so running agents can see it via filesystem.

## Changes

### src/watcher.rs

In both `handle_streaming_line` and `handle_streaming_line_with_session`, after the `store.insert_finding()` call, also write the finding to the broadcast file:

```rust
if let Some(finding) = extract_finding_detail(line) {
    if let Some(group_id) = workgroup_id {
        let _ = store.insert_finding(group_id, &finding, Some(task_id.as_str()));
        // Also append to workspace broadcast file for running agents
        append_to_broadcast(group_id, task_id.as_str(), &finding);
    }
}
```

Add the helper function at module level:

```rust
fn append_to_broadcast(workgroup_id: &str, task_id: &str, content: &str) {
    let broadcast_path = crate::paths::workspace_dir(workgroup_id).join("broadcast.md");
    if let Ok(mut file) = std::fs::OpenOptions::new()
        .create(true)
        .append(true)
        .open(&broadcast_path)
    {
        use std::io::Write;
        let timestamp = chrono::Local::now().format("%H:%M:%S");
        let _ = writeln!(file, "- [{timestamp}] ({task_id}) {content}");
    }
}
```

### Test

Add a test:
```rust
