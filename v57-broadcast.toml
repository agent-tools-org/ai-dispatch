[[task]]
name = "broadcast-cli"
agent = "codex"
prompt = """
Add `aid broadcast` CLI command to send messages to a workgroup's broadcast file.

## src/cmd/broadcast.rs (NEW FILE, < 40 lines)

```rust
// CLI handler for `aid broadcast` — send messages to workgroup broadcast file.
// Exports: run.
// Deps: paths, store.

use anyhow::Result;
use crate::store::Store;

pub fn run(store: &Store, group_id: &str, message: &str) -> Result<()> {
    // Verify workgroup exists
    store.get_workgroup(group_id)?
        .ok_or_else(|| anyhow::anyhow!("Workgroup '{group_id}' not found"))?;

    let broadcast_path = crate::paths::workspace_dir(group_id).join("broadcast.md");
    let dir = broadcast_path.parent().unwrap();
    std::fs::create_dir_all(dir)?;

    use std::io::Write;
    let mut file = std::fs::OpenOptions::new()
        .create(true)
        .append(true)
        .open(&broadcast_path)?;
    let timestamp = chrono::Local::now().format("%H:%M:%S");
    writeln!(file, "- [{timestamp}] (orchestrator) {message}")?;

    println!("Broadcast sent to {group_id}");
    Ok(())
}
```

## src/cmd/mod.rs

Add `pub mod broadcast;`

## src/main.rs

Add a Broadcast command variant:
```rust
/// Send a message to a workgroup's broadcast channel
Broadcast {
    /// Workgroup ID
    group: String,
    /// Message to broadcast
    message: String,
},
```

Add the match handler:
```rust
Commands::Broadcast { group, message } => {
    cmd::broadcast::run(&store, &group, &message)?;
}
```

IMPORTANT: Follow the exact pattern used by `cmd::finding`. Keep the file under 40 lines.

[MILESTONE] broadcast CLI done
"""
worktree = "feat/broadcast-cli"
context = ["src/cmd/finding.rs", "src/cmd/mod.rs", "src/main.rs:FindingCommands,Commands::Finding"]
depends_on = ["workspace-setup"]
