[defaults]
verify = "auto"

[[task]]
name = "false-positive-fix"
agent = "codex"
prompt = """
Fix false-positive [MILESTONE] and [FINDING] extraction in the watcher.

## Problem

When agents write code that contains string literals like `"[MILESTONE] tests passing"` or `println!("[FINDING] gamma")`, the watcher incorrectly extracts these as real milestones/findings. The extraction functions in `src/watcher.rs` don't distinguish between an agent *emitting* a tag vs writing code that *contains* a tag.

## Solution

Add a `looks_like_code_string` sanity check that rejects lines where the tag appears inside:
- A Rust/Python/JS string literal (surrounded by quotes)
- A code block marker (triple backticks)
- A println!/eprintln!/console.log call wrapping the tag

Implement in `src/watcher.rs`:

```rust
/// Returns true if the tag at `tag_pos` in `line` appears to be inside a code string literal.
fn tag_is_inside_code_string(line: &str, tag_pos: usize) -> bool {
    let before = &line[..tag_pos];
    // Count unescaped quotes before the tag — odd count means we're inside a string
    let single_quotes = before.chars().filter(|&c| c == '\u0027').count();
    let double_quotes = before.chars().filter(|&c| c == '\u0022').count();
    if double_quotes % 2 == 1 || single_quotes % 2 == 1 {
        return true;
    }
    // Inside a code fence or common print statement
    let trimmed = line.trim();
    if trimmed.starts_with("```") || trimmed.starts_with("///") {
        return true;
    }
    false
}
```

Then update `extract_milestone_from_text` and `extract_finding_from_text` to call this check:

```rust
fn extract_milestone_from_text(text: &str) -> Option<String> {
    text.lines().find_map(|line| {
        let tag_pos = line.find("[MILESTONE]")?;
        if tag_is_inside_code_string(line, tag_pos) {
            return None;
        }
        let detail = line[tag_pos + "[MILESTONE]".len()..].trim().trim_start_matches(':').trim();
        if detail.is_empty() { None } else { Some(detail.to_string()) }
    })
}
```

Apply the same pattern to `extract_finding_from_text`.

## Tests

Add these tests:

```rust
#[test]
fn milestone_inside_string_literal_is_rejected() {
    let line = r#"println!("[MILESTONE] tests passing");"#;
    assert!(super::extract_milestone_detail(line).is_none());
}

#[test]
fn milestone_inside_json_string_value_is_rejected() {
    let line = r#"{"text": "assert_eq!(detail, \"[MILESTONE] done\")"}"#;
    assert!(super::extract_milestone_detail(line).is_none());
}

#[test]
fn finding_inside_string_literal_is_rejected() {
    let line = r#"let s = "[FINDING] gamma can be zero";"#;
    assert!(super::extract_finding_detail(line).is_none());
}

#[test]
fn real_milestone_still_extracted() {
    let detail = super::extract_milestone_detail("[MILESTONE] implementation complete");
    assert_eq!(detail.as_deref(), Some("implementation complete"));
}

#[test]
fn real_finding_still_extracted() {
    let detail = super::extract_finding_detail("[FINDING] pool has degenerate state");
    assert_eq!(detail.as_deref(), Some("pool has degenerate state"));
}
```

IMPORTANT: Do NOT modify `extract_milestone_detail` or `extract_finding_detail` — only modify the `_from_text` functions and add the new `tag_is_inside_code_string` helper. The JSON path functions will call into the text functions which will apply the check.

[MILESTONE] false-positive fix implemented
"""
worktree = "fix/tag-false-positive"
context = ["src/watcher.rs:extract_milestone_from_text,extract_finding_from_text,extract_milestone_detail,extract_finding_detail"]

