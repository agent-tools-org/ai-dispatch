[defaults]
agent = "codex"
verify = "cargo check"

[[tasks]]
name = "success-routing"
worktree = "feat/success-routing"
prompt = """Enhance success-weighted agent routing in src/agent/selection.rs.

CURRENT STATE (lines 152-155):
The history_map lookup applies a binary bonus: -3 if rate < 0.65, +2 if rate >= 0.90.
This is too coarse — a 70% agent gets the same score as an 89% agent.

TASK:
Replace the binary threshold with a continuous scoring formula:
1. Change lines 152-155 to use a linear interpolation:
   - rate 0.0 → -5, rate 0.5 → -2, rate 0.75 → 0, rate 1.0 → +4
   - Formula: `((rate - 0.75) * 16.0).round() as i32` clamped to [-5, +4]
   - Only apply when count >= 5 (keep existing guard)
2. Update the reason string to include the success rate. In the reason formatting section,
   if history_map has data for the selected agent, append "(success: {rate:.0%})" to the reason.

ALSO:
- Add tests in the existing tests module:
  - test that 95% success rate agent beats 60% success rate agent for same category
  - test that < 5 tasks doesn't affect scoring (existing test likely covers this)
- Run cargo test to verify

CONTEXT: The history comes from store.agent_success_rates() which returns Vec<(AgentKind, f64, usize)>
where f64 is the success rate (0.0-1.0) and usize is task count.
"""
context = ["src/agent/selection.rs"]

[[tasks]]
name = "memory-schema-upgrade"
worktree = "feat/memory-schema"
prompt = """Add append-only versioning and usage tracking columns to the memories table.

FILES TO MODIFY:
1. src/store/schema.rs — Add migration SQL
2. src/store/mutations.rs — Update insert_memory and update_memory
3. src/store/queries.rs — Update list_memories query
4. src/types.rs — Update Memory struct

SCHEMA CHANGES (add via ALTER TABLE migration, NOT by changing CREATE TABLE):
```sql
ALTER TABLE memories ADD COLUMN supersedes TEXT;
ALTER TABLE memories ADD COLUMN version INTEGER NOT NULL DEFAULT 1;
ALTER TABLE memories ADD COLUMN inject_count INTEGER NOT NULL DEFAULT 0;
ALTER TABLE memories ADD COLUMN last_injected_at TEXT;
ALTER TABLE memories ADD COLUMN success_count INTEGER NOT NULL DEFAULT 0;
```

BEHAVIOR CHANGES:
1. update_memory() — Instead of UPDATE in place, INSERT a new row with:
   - New id (generate with same pattern as insert_memory)
   - supersedes = old_id
   - version = old_version + 1
   - Copy all other fields from old row, update content + content_hash + created_at
   - Do NOT delete old row
2. Add increment_memory_inject(id) — bumps inject_count and last_injected_at
3. Add increment_memory_success(id) — bumps success_count
4. list_memories() — only return latest version of each memory chain
   (WHERE supersedes IS NULL OR id NOT IN (SELECT supersedes FROM memories WHERE supersedes IS NOT NULL))
   Actually simpler: WHERE id NOT IN (SELECT DISTINCT supersedes FROM memories WHERE supersedes IS NOT NULL)
5. Add list_memory_history(id) — follow supersedes chain to show all versions

Add Memory struct fields: supersedes, version, inject_count, last_injected_at, success_count.

MIGRATION: Add the ALTER TABLE statements to the migrate() function in schema.rs.
Use the same pattern as existing migrations (try ALTER, ignore if column exists).

Include unit tests for:
- Insert + update creates new version with supersedes link
- list_memories returns only latest versions
- increment functions work
- list_memory_history returns full chain
"""
context = ["src/store/schema.rs", "src/store/mutations.rs", "src/store/queries.rs", "src/types.rs"]

[[tasks]]
name = "memory-cli-stats"
worktree = "feat/memory-cli-stats"
depends_on = ["memory-schema-upgrade"]
prompt = """Add --stats flag to `aid memory list` to show usage tracking data.

FILES TO MODIFY:
1. src/main.rs or src/cli.rs — Add --stats flag to Memory List subcommand
2. src/cmd/memory.rs — Update list handler to show stats columns

CURRENT: `aid memory list` shows id, type, content preview, created_at.

WITH --stats: Also show inject_count, success_count, last_injected_at columns.
Format as a table with columns: ID | Type | Injects | Successes | Last Used | Content

Also add `aid memory history <id>` subcommand:
- Show all versions of a memory chain (follow supersedes links)
- Format: Version | Created | Content preview

Keep it simple — just table output, no fancy formatting.
Run cargo check and cargo test to verify.
"""
context = ["src/cmd/memory.rs"]

[[tasks]]
name = "episodic-memory"
worktree = "feat/episodic-memory"
depends_on = ["memory-schema-upgrade"]
prompt = """Implement episodic memory: tag memories with task outcomes and use in injection priority.

FILES TO MODIFY:
1. src/watcher.rs or src/cmd/run_prompt.rs — After task completion, if task has memories, call increment_memory_success for DONE tasks
2. src/workgroup.rs or wherever memories are injected — Sort memories by injection priority before injecting

INJECTION PRIORITY FORMULA:
priority = inject_count * 0.3 + success_count * 1.0 - (days_since_last_inject * 0.1)
Higher priority = inject first. Cap at top 10 memories per injection.

BEHAVIOR:
1. When a task completes with DONE/MERGED status, find all memories that were injected into it
   (memories matching the task's project_path). Call increment_memory_success for each.
2. When injecting memories into a new task prompt, sort by priority descending.
   Only inject top 10 to avoid prompt bloat.
3. After injecting, call increment_memory_inject for each injected memory.

Add tests:
- priority calculation test
- success increment test
- injection ordering test

Run cargo check and cargo test.
"""
context = ["src/workgroup.rs", "src/cmd/run_prompt.rs", "src/types.rs"]
