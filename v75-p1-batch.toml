# v7.5 P1 — Memory Quality + Dispatch Intelligence
# Uses --judge (our v7.5 feature) for auto-review

[defaults]
verify = true
judge = "gemini"

[[task]]
name = "surprise-filter"
agent = "codex"
prompt = """Add surprise-based memory filtering to prevent trivial memory accumulation.

CONTEXT: When agents extract [MEMORY] tags from output, we currently store everything. We need a lightweight filter that skips memories that are obvious/derivable from code.

WHAT TO DO:
1. In src/cmd/run_prompt.rs, find the `inject_memories()` function. This is where memories are searched and injected. Near this code path, there should be a place where new memories are stored from agent output.

2. Find where memories get added (likely in src/cmd/memory.rs `add()` function or wherever [MEMORY] tags are extracted from agent output). Add a `is_surprising()` filter function.

3. The `is_surprising()` function should check:
   - Skip if memory content is < 20 chars (too trivial)
   - Skip if memory content matches common boilerplate patterns (e.g. "the code uses X" where X is obvious from imports)
   - Skip if memory type is "discovery" and content just restates a function signature or type name
   - Keep memories that mention: bugs, workarounds, non-obvious behavior, gotchas, performance notes, external API details

4. Add the filter in src/cmd/memory.rs as a public function `is_surprising(content: &str, memory_type: &str) -> bool`

5. Wire it: in the `add()` function, if `!is_surprising(content, memory_type)`, print a warning "[aid] Skipping trivial memory: <first 50 chars>..." and return Ok without inserting.

6. Add unit tests for is_surprising() covering: trivial content rejected, real discoveries accepted, edge cases.

IMPORTANT: Do NOT modify the store schema. This is purely an application-level filter.
"""
worktree = "feat/surprise-filter"
context = ["src/cmd/memory.rs", "src/cmd/run_prompt.rs:inject_memories"]

[[task]]
name = "cross-session-hints"
agent = "codex"
prompt = """Add cross-session routing hints to agent auto-selection.

CONTEXT: In src/agent/selection.rs, `select_agent_from()` picks agents based on capability scores, history, and cost-efficiency. We want to add a hint showing which agent succeeded on similar past tasks.

WHAT TO DO:
1. In src/store/queries.rs, add a new method:
   `pub fn find_similar_tasks(&self, prompt: &str, limit: usize) -> Result<Vec<(String, AgentKind, TaskStatus)>>`

   Implementation:
   - Extract top 3 keywords from prompt (longest words, excluding stopwords like "the", "and", "for", etc.)
   - Query: SELECT id, agent, status, prompt FROM tasks WHERE status IN ('done','failed') ORDER BY created_at DESC LIMIT 200
   - Score each by counting keyword matches in their prompt (case-insensitive)
   - Return top `limit` results sorted by match score descending
   - Only return tasks with score > 0

2. In src/agent/selection.rs `select_agent_from()`, after computing the final selection:
   - Call `store.find_similar_tasks(&prompt, 5)`
   - Count which agents succeeded vs failed on similar tasks
   - If there's a clear winner (>= 3 successes on similar tasks), append to reason: "; similar tasks: codex 4/5 success"
   - Do NOT change the actual selection — this is informational only for v1

3. Add unit tests:
   - Test find_similar_tasks with seeded data
   - Test that reason string contains "similar tasks" hint when history exists
   - Test that no hint appears with empty history

IMPORTANT: Keep the keyword extraction simple — split on whitespace, filter len < 4, take top 3 by length. No external deps.
"""
worktree = "feat/cross-session-hints"
context = ["src/agent/selection.rs:select_agent_from", "src/store/queries.rs:agent_avg_costs"]

[[task]]
name = "best-of-n"
agent = "codex"
prompt = """Add --best-of N flag for dispatching same task to N cheap agents and picking the best result.

CONTEXT: BEST-Route paper shows dispatching to N cheap agents and judging results often beats single expensive call. We already have --judge for single-task review. --best-of extends this to multi-dispatch.

WHAT TO DO:
1. In src/cli.rs, add to the Run command:
   `#[arg(long, value_name = "N")]`
   `best_of: Option<usize>,`

2. In src/cmd/run.rs RunArgs, add:
   `pub best_of: Option<usize>,`
   Update Default impl if needed.

3. In src/main.rs Commands::Run match, wire `best_of` to RunArgs.

4. In src/cmd/run.rs, add a new function:
   `async fn run_best_of(store: Arc<Store>, args: RunArgs, n: usize) -> Result<TaskId>`

   Implementation:
   - Validate n >= 2, n <= 5
   - Pick cheap agents: use budget-mode selection to get top N agents (or repeat same agent N times if only 1 available)
   - For each of the N candidates, create a modified RunArgs with background=true, judge=None (we judge ourselves)
   - Dispatch all N via `run()` concurrently using tokio::spawn
   - Wait for all to complete (poll store every 2s like wait_for_any_completion in batch.rs)
   - For each completed task that is Done, gather diff/output (reuse judge.rs gather_diff/read_output)
   - Pick the best: if only 1 succeeded, use it. If multiple succeeded, use the one with the most lines changed (simple heuristic).
   - Print "[aid] best-of-{n}: picked {task_id} ({agent}) over {others}"
   - Return the winning task_id

5. In the main `run()` function, before the normal dispatch path, check:
   `if let Some(n) = args.best_of { return run_best_of(store, args, n).await.map(|id| id.to_string()); }`

6. Add to batch.rs BatchTask and BatchDefaults:
   `pub best_of: Option<usize>,`
   Wire through task_to_run_args.

7. Tests:
   - CLI parsing test: verify --best-of 3 is accepted
   - Validation test: best_of=0 or best_of=1 should error
   - Unit test for pick_best logic

IMPORTANT: Keep gather_diff and read_output as pub(crate) in judge.rs so best-of-n can reuse them. The judge module functions that are currently private need their visibility changed.
"""
worktree = "feat/best-of-n"
context = ["src/cli.rs:Run", "src/cmd/run.rs:RunArgs", "src/cmd/judge.rs", "src/cmd/batch.rs:task_to_run_args"]
