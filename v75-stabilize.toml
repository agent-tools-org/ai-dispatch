# v7.5 stabilization: clippy cleanup + test improvements

[defaults]
verify = true

[[task]]
name = "clippy-cleanup"
agent = "codex"
prompt = """Fix ALL clippy warnings in the codebase. Run `cargo clippy --bin aid 2>&1` to see the full list (~93 warnings).

The main warning types are:
1. `collapsible_if` (~63 warnings) — collapse nested if/if-let into single `if x && y` using let-chains
2. `literal with an empty format string` (~8 warnings) — use variable directly instead of `format!("{}", x)` where x is already a string
3. `redundant closure` (~6 warnings) — replace `|x| foo(x)` with just `foo`
4. `push_str single char` (~4 warnings) — use `.push(';')` instead of `.push_str(";")`
5. `too many arguments` (~2 warnings) — refactor functions with >7 args into struct-based params
6. `&PathBuf instead of &Path` (~1 warning) — change param type
7. `and_then(|x| Some(y))` → `map(|x| y)` (~1 warning)
8. Other minor warnings

IMPORTANT:
- Do NOT change any logic or behavior — only fix clippy warnings
- After all fixes, run `cargo clippy --bin aid 2>&1` and verify ZERO warnings
- Run `cargo test --bin aid` and verify all tests pass (should be 287+)
- If a fix would change behavior, skip it and leave the warning
"""
worktree = "fix/clippy-cleanup"
