## Changes

### 1. New function in src/cmd/summary.rs
```rust
pub fn format_sibling_summaries(summaries: &[CompletionSummary]) -> String {
    if summaries.is_empty() { return String::new(); }
    let mut lines = vec!["## Sibling Task Context".to_string()];
    for s in summaries {
        lines.push(format!(
            "- {} ({}): {} | Files: {}",
            s.task_id, s.agent, s.status,
            if s.files_changed.is_empty() { "(none)".to_string() }
            else { s.files_changed.join(", ") }
        ));
    }
    lines.join("\n")
}
```

### 2. Inject in src/cmd/run_prompt.rs
After the parent summary injection block (around line 59), add:
```rust
// Inject sibling task summaries from same workgroup
if let Some(ref group_id) = args.group {
    let sibling_summaries = collect_sibling_summaries(store, group_id, &task_id_hint)?;
    if !sibling_summaries.is_empty() {
        let block = crate::cmd::summary::format_sibling_summaries(&sibling_summaries);
        effective_prompt = format!("{block}\n\n{effective_prompt}");
    }
}
```

Where `collect_sibling_summaries` is a helper function in run_prompt.rs:
```rust
fn collect_sibling_summaries(
    store: &Store,
    group_id: &str,
    current_task_id: &str,
) -> Result<Vec<CompletionSummary>> {
    let tasks = store.list_tasks_by_group(group_id)?;
    let mut summaries = Vec::new();
    for task in &tasks {
        if task.id.as_str() == current_task_id { continue; }
        if !task.status.is_terminal() { continue; }
        if let Some(json) = store.get_completion_summary(task.id.as_str())? {
            if let Ok(summary) = serde_json::from_str::<CompletionSummary>(&json) {
                summaries.push(summary);
            }
        }
    }
    // Cap at 5 most recent to avoid prompt bloat
    summaries.truncate(5);
    Ok(summaries)
}
```

Note: `build_prompt_bundle` needs to know the current task_id to exclude self. Check the function signature — if task_id is not available, pass it as a new parameter or use an empty string default.

