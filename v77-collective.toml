### 5. Add metric evaluation function
In src/cmd/run.rs:
```rust
fn evaluate_metric(metric_cmd: &str, worktree_path: Option<&str>) -> Option<f64> {
    let dir = worktree_path.unwrap_or(".");
    let output = std::process::Command::new("sh")
        .args(["-c", metric_cmd])
        .current_dir(dir)
        .output()
        .ok()?;
    if !output.status.success() { return None; }
    let stdout = String::from_utf8_lossy(&output.stdout);
    // Extract last number from output
    stdout.trim().lines().last()
        .and_then(|line| {
            line.trim().split_whitespace().last()
                .and_then(|word| word.parse::<f64>().ok())
        })
}
```

### 6. Update CandidateResult::from_task
If `metric_cmd` is Some, call `evaluate_metric` and store in `metric_score`.

### 7. Update pick_best_result
```rust
fn pick_best_result(candidates: &[CandidateResult]) -> Option<&CandidateResult> {
    candidates
        .iter()
        .filter(|c| c.status == TaskStatus::Done)
        .max_by(|a, b| {
            // Prefer metric_score if available, otherwise diff_line_count
            match (a.metric_score, b.metric_score) {
                (Some(sa), Some(sb)) => sa.partial_cmp(&sb).unwrap_or(std::cmp::Ordering::Equal),
                (Some(_), None) => std::cmp::Ordering::Greater,
                (None, Some(_)) => std::cmp::Ordering::Less,
                (None, None) => a.diff_line_count.cmp(&b.diff_line_count),
            }
        })
}
```

