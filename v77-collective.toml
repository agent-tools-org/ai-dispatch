#[test]
fn pick_best_result_prefers_metric_score() {
    let candidates = vec![
        CandidateResult { task_id: TaskId::new("t-1"), agent_label: "a".into(), status: TaskStatus::Done, diff_line_count: 100, metric_score: Some(3.0) },
        CandidateResult { task_id: TaskId::new("t-2"), agent_label: "b".into(), status: TaskStatus::Done, diff_line_count: 10, metric_score: Some(9.0) },
    ];
    let best = pick_best_result(&candidates).unwrap();
    assert_eq!(best.task_id.as_str(), "t-2");
}
```

