## File header
```rust
// Core experiment loop: dispatch → measure → keep/revert.
// Exports: run_experiment().
// Deps: experiment_types, experiment_persist, cmd::run, store.
```

## Core function
```rust
pub async fn run_experiment(store: Arc<Store>, config: ExperimentConfig) -> Result<()>
```

### Loop logic (for each run 1..=max_runs):
1. **Snapshot**: `git stash create` to save current state (for revert)
2. **Dispatch**: `cmd::run::run(store, RunArgs { agent, prompt, verify, ... })` with worktree
3. **Wait**: task completes (it's foreground)
4. **Checks** (if config.checks is Some): run the checks command, if it fails → revert and continue
5. **Measure**: run `config.metric_command`, parse output as f64
6. **Decide**: if `state.is_improvement(value)` → keep (commit), else → revert (`git checkout .`)
7. **Record**: `save_run(path, &run)` to experiment.jsonl
8. **Report**: print iteration summary to stderr

### Wire in main.rs
Replace the placeholder in `Commands::Experiment(ExperimentCommands::Run { .. })` with actual call:
```rust
