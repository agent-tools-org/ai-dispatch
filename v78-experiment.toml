    direction: match direction.as_str() { "min" => MetricDirection::Min, _ => MetricDirection::Max },
    agent,
    prompt,
    checks,
    max_runs: Some(max_runs),
    worktree: None,
};
cmd::experiment::run_experiment(store, config).await?;
```

Register in `src/cmd/mod.rs`: `pub mod experiment;`

### Metric evaluation helper (reuse pattern from run.rs evaluate_metric if it exists)
```rust
fn evaluate_metric(cmd: &str, dir: &str) -> Result<f64> {
    let output = std::process::Command::new("sh")
        .args(["-c", cmd])
        .current_dir(dir)
        .output()
        .context("metric command failed")?;
    if !output.status.success() {
        anyhow::bail!("metric command exited with {}", output.status);
    }
    let stdout = String::from_utf8_lossy(&output.stdout);
    stdout.trim().lines().last()
        .and_then(|l| l.trim().split_whitespace().last())
        .and_then(|w| w.parse::<f64>().ok())
        .ok_or_else(|| anyhow::anyhow!("metric command output is not a number"))
}
```

### Git helpers
```rust
fn git_revert(dir: &str) -> Result<()> {
    std::process::Command::new("git")
        .args(["checkout", "."])
        .current_dir(dir)
        .output()?;
    Ok(())
}

fn git_commit(dir: &str, message: &str) -> Result<()> {
    std::process::Command::new("git")
        .args(["add", "-A"])
        .current_dir(dir)
        .output()?;
    std::process::Command::new("git")
        .args(["commit", "-m", message])
        .current_dir(dir)
        .output()?;
    Ok(())
}
```

