# === Independent: Rolling context compression ===

[[task]]
name = "context-compression"
agent = "codex"
prompt = """Add rolling context compression for workgroup prompts.

When a workgroup has many completed tasks, the injected context (milestones, findings, sibling summaries) can grow very large. Add compression to keep it under a token budget.

## Context files
- src/workgroup.rs (compose_prompt — builds the workgroup context)
- src/cmd/run_prompt.rs (build_prompt_bundle — calls compose_prompt)

## Changes

### 1. Add `compress_workgroup_context` in src/workgroup.rs

```rust
const MAX_CONTEXT_CHARS: usize = 6000; // ~1500 tokens

pub fn compress_workgroup_context(context: &str) -> String {
    if context.len() <= MAX_CONTEXT_CHARS {
        return context.to_string();
    }
    // Strategy: keep header + most recent entries, drop middle
    let lines: Vec<&str> = context.lines().collect();
    let header_count = lines.iter().take(5).count().min(5);
    let footer_budget = MAX_CONTEXT_CHARS * 2 / 3; // 2/3 for recent entries
    let header_budget = MAX_CONTEXT_CHARS / 3; // 1/3 for header

    let mut header = String::new();
    for line in lines.iter().take(header_count) {
        if header.len() + line.len() + 1 > header_budget { break; }
        header.push_str(line);
        header.push('\n');
    }

    let mut footer = String::new();
    let mut footer_lines = Vec::new();
    for line in lines.iter().rev() {
        if footer.len() + line.len() + 1 > footer_budget { break; }
        footer_lines.push(*line);
        footer = footer_lines.iter().rev().cloned().collect::<Vec<_>>().join("\n");
    }

    format!("{header}\n[... {} lines compressed ...]\n\n{footer}", lines.len() - header_count - footer_lines.len())
}
```

### 2. Apply compression in compose_prompt
After building the full context string, wrap it:
```rust
let context = compress_workgroup_context(&full_context);
```

### 3. Tests
- `short_context_unchanged` — under limit passes through
- `long_context_compressed` — over limit gets header + footer with compression marker
- `compression_preserves_recent` — last entries are kept intact

Run `cargo test --bin aid` and `cargo clippy --bin aid`.
"""
worktree = "feat/context-compression"
