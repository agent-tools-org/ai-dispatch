Add 't' key toggle (same pattern as 'd' for dashboard, 's' for stats):
```rust
KeyCode::Char('t') => {
    self.tree_mode = !self.tree_mode;
    if self.tree_mode {
        self.dashboard_mode = false;
        self.stats_mode = false;
        self.multipane_mode = false;
        self.detail_mode = false;
    }
