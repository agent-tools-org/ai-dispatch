### 4. Tree view renderer (src/tui/ui.rs)
Add `render_tree_view` function:
```rust
fn render_tree_view(frame: &mut ratatui::Frame<'_>, app: &App) {
    let chunks = Layout::default()
        .direction(Direction::Vertical)
        .constraints([
            Constraint::Length(1),
            Constraint::Min(5),
            Constraint::Length(1),
        ])
        .split(frame.area());

    // Header
    frame.render_widget(
        Paragraph::new(Line::from(vec![
            Span::styled("aid ", Style::default().fg(Color::Cyan).add_modifier(Modifier::BOLD)),
            Span::styled("tree view", Style::default().fg(Color::Yellow)),
        ])).alignment(Alignment::Center),
        chunks[0],
    );

    // Build tree
    let tree_nodes = super::tree_data::build_task_tree(&app.tasks);
    let items: Vec<ListItem> = tree_nodes.iter().map(|node| {
        let status_color = match node.task.status {
            TaskStatus::Done | TaskStatus::Merged => Color::Green,
            TaskStatus::Failed => Color::Red,
            TaskStatus::Pending | TaskStatus::Queued => Color::Yellow,
            _ => Color::Cyan,
        };
        let duration = format_duration_short(node.task.duration_ms);
        let agent = node.task.agent_display_name();
        let prompt_preview: String = node.task.prompt.chars().take(40).collect();

        let line = Line::from(vec![
            Span::styled(&node.prefix, Style::default().fg(Color::DarkGray)),
            Span::styled(node.task.id.as_str(), Style::default().fg(Color::White).add_modifier(Modifier::BOLD)),
            Span::raw(" "),
            Span::styled(agent, Style::default().fg(Color::Cyan)),
            Span::raw(" "),
            Span::styled(node.task.status.label(), Style::default().fg(status_color)),
            Span::raw(" "),
            Span::styled(duration, Style::default().fg(Color::Indexed(250))),
            Span::raw("  "),
            Span::styled(prompt_preview, Style::default().fg(Color::Indexed(245))),
        ]);
        ListItem::new(line)
    }).collect();

    let list = List::new(items)
        .block(Block::default().title("Task Tree").borders(Borders::ALL))
        .highlight_style(Style::default().bg(Color::Indexed(237)).add_modifier(Modifier::BOLD));

    frame.render_widget(list, chunks[1]);

    // Footer
    let footer = Line::from(vec![
        Span::styled(" t", Style::default().fg(Color::Yellow).add_modifier(Modifier::BOLD)),
        Span::raw(":table "),
        Span::styled("d", Style::default().fg(Color::Yellow).add_modifier(Modifier::BOLD)),
        Span::raw(":dashboard "),
        Span::styled("m", Style::default().fg(Color::Yellow).add_modifier(Modifier::BOLD)),
        Span::raw(":multipane "),
        Span::styled("q", Style::default().fg(Color::Yellow).add_modifier(Modifier::BOLD)),
        Span::raw(":quit"),
    ]);
    frame.render_widget(Paragraph::new(footer), chunks[2]);
}

fn format_duration_short(duration_ms: Option<i64>) -> String {
    match duration_ms {
        Some(ms) => {
            let secs = ms / 1000;
            if secs < 60 { format!("{secs}s") }
            else if secs < 3600 { format!("{}m", secs / 60) }
            else { format!("{}h", secs / 3600) }
        }
        None => "-".to_string(),
    }
}
```

