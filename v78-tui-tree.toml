Add tests:
```rust
#[cfg(test)]
mod tests {
    use super::*;
    use crate::types::*;
    use chrono::Local;

    fn mock_task(id: &str, parent: Option<&str>) -> Task {
        Task {
            id: TaskId::new(id),
            agent: "codex".to_string(),
            prompt: "test".to_string(),
            status: TaskStatus::Done,
            parent_task_id: parent.map(str::to_string),
            created_at: Local::now(),
            ..Default::default()
        }
    }

    #[test]
    fn flat_tasks_no_hierarchy() {
        let tasks = vec![mock_task("t-1", None), mock_task("t-2", None)];
        let tree = build_task_tree(&tasks);
        assert_eq!(tree.len(), 2);
        assert_eq!(tree[0].depth, 0);
        assert_eq!(tree[1].depth, 0);
    }

    #[test]
    fn parent_child_creates_hierarchy() {
        let tasks = vec![
            mock_task("t-parent", None),
            mock_task("t-child1", Some("t-parent")),
            mock_task("t-child2", Some("t-parent")),
        ];
        let tree = build_task_tree(&tasks);
        assert_eq!(tree.len(), 3);
        assert_eq!(tree[0].depth, 0);
        assert_eq!(tree[1].depth, 1);
        assert_eq!(tree[2].depth, 1);
    }

    #[test]
    fn nested_hierarchy() {
        let tasks = vec![
            mock_task("t-root", None),
            mock_task("t-mid", Some("t-root")),
            mock_task("t-leaf", Some("t-mid")),
        ];
        let tree = build_task_tree(&tasks);
        assert_eq!(tree.len(), 3);
        assert_eq!(tree[0].depth, 0);
        assert_eq!(tree[1].depth, 1);
        assert_eq!(tree[2].depth, 2);
    }
}
```

