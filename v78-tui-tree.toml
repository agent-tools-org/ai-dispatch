# TUI Tree View — show task relationships

[defaults]
verify = true
dir = "."

[[task]]
name = "tree-data"
agent = "opencode"
prompt = """Add tree data structures and logic for building task hierarchy in TUI.

Create `src/tui/tree_data.rs`:

File header:
```rust
// Build a tree of tasks by parent_task_id and workgroup relationships.
// Exports: TreeNode, build_task_tree.
// Deps: crate::types::Task.
```

```rust
use crate::types::{Task, TaskStatus};

#[derive(Debug, Clone)]
pub struct TreeNode {
    pub task: Task,
    pub depth: usize,
    pub is_last: bool,
    pub prefix: String,  // e.g. "├── " or "└── " or "│   ├── "
}

/// Build a flat list of TreeNodes with proper indentation from a task list.
/// Groups by: workgroup → parent_task_id hierarchy → retry chains.
pub fn build_task_tree(tasks: &[Task]) -> Vec<TreeNode> {
    let mut result = Vec::new();
    let mut seen = std::collections::HashSet::new();

    // First: find root tasks (no parent_task_id, or parent not in task list)
    let task_ids: std::collections::HashSet<&str> = tasks.iter().map(|t| t.id.as_str()).collect();
    let mut roots: Vec<&Task> = tasks.iter()
        .filter(|t| {
            match t.parent_task_id.as_deref() {
                None => true,
                Some(pid) => !task_ids.contains(pid),
            }
        })
        .collect();
    // Sort roots: running first, then by created_at desc
    roots.sort_by(|a, b| {
        let a_active = !a.status.is_terminal();
        let b_active = !b.status.is_terminal();
        b_active.cmp(&a_active).then(b.created_at.cmp(&a.created_at))
    });

    for root in &roots {
        if seen.contains(root.id.as_str()) { continue; }
        seen.insert(root.id.as_str());
        result.push(TreeNode {
            task: (*root).clone(),
            depth: 0,
            is_last: false,
            prefix: String::new(),
        });
        add_children(root.id.as_str(), tasks, &mut result, &mut seen, 1, "");
    }
    // Fix is_last for each depth level
    fix_last_flags(&mut result);
    result
}

fn add_children(
    parent_id: &str,
    tasks: &[Task],
    result: &mut Vec<TreeNode>,
    seen: &mut std::collections::HashSet<String>,
    depth: usize,
    parent_prefix: &str,
) {
    let children: Vec<&Task> = tasks.iter()
        .filter(|t| t.parent_task_id.as_deref() == Some(parent_id) && !seen.contains(t.id.as_str()))
        .collect();
    for (i, child) in children.iter().enumerate() {
        let is_last = i + 1 == children.len();
        let connector = if is_last { "└── " } else { "├── " };
        let child_prefix = format!("{parent_prefix}{connector}");
        seen.insert(child.id.as_str().to_string());
        result.push(TreeNode {
            task: (*child).clone(),
            depth,
            is_last,
            prefix: child_prefix.clone(),
        });
        let next_parent_prefix = format!("{parent_prefix}{}", if is_last { "    " } else { "│   " });
        add_children(child.id.as_str(), tasks, result, seen, depth + 1, &next_parent_prefix);
    }
}

fn fix_last_flags(nodes: &mut [TreeNode]) {
    // Already handled in add_children
}
```

