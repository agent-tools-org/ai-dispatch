# Task 4: Strip [MILESTONE] tags from captured agent output
[[tasks]]
agent = "opencode"
worktree = "v79-milestone-strip"
prompt = """
In src/watcher.rs, filter out lines containing [MILESTONE] from the captured output that gets written to log files and output files. The milestone events should still be extracted and saved to the database, but the raw [MILESTONE] text should NOT appear in the log/output files.

Currently in watch_streaming() (line ~73-75):
```rust
log_file.write_all(line.as_bytes()).await?;
log_file.write_all(b"\n").await?;
```
This writes every line to the log. Add a check: if extract_milestone_detail(&line).is_some(), skip writing that line to the log file.

Similarly in watch_buffered() (line ~170-178), after reading all output into buffer:
- Before writing to log_path and output_path, filter out lines containing [MILESTONE]
- Use the existing extract_milestone_detail() function (line ~335) to detect milestone lines
- Filter: `buffer.lines().filter(|line| extract_milestone_detail(line).is_none()).collect::<Vec<_>>().join("\n")`

Add a test in the existing tests module:
```rust
#[test]
fn milestone_lines_stripped_from_output() {
    let input = "line1\n[MILESTONE] types defined\nline2\n";
    let filtered: String = input.lines()
        .filter(|line| extract_milestone_detail(line).is_none())
        .collect::<Vec<_>>()
        .join("\n");
    assert_eq!(filtered, "line1\nline2");
}
```

RULES:
- Milestones must still be extracted and saved as events (don't break that)
- Only filter them from log/output file writes
- Keep the fix minimal — don't refactor surrounding code
"""
