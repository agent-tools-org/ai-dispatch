# v8.0 — Programmable Orchestration (batch 1)
# 3 independent M-complexity tasks, parallel dispatch

[defaults]
agent = "codex"
dir = "."
verify = "cargo check"

[[task]]
name = "pre-dispatch-validation"
prompt = """Add a pre-dispatch prompt validation function in src/cmd/run.rs.

Create a `validate_dispatch(args: &RunArgs, agent_kind: &AgentKind) -> Vec<String>` function that returns a list of warnings (empty = valid). Check for:
1. Prompt too short (< 10 chars) — warn "Prompt is very short, agent may not have enough context"
2. Code agents (codex, opencode, cursor, kilo, codebuff) without --dir — warn "Code agent without --dir may not be able to write files"
3. Prompt > 5000 chars — warn "Very long prompt (N chars), consider using --context files instead"
4. Research agents (gemini) with --worktree — warn "Research agent with --worktree is unusual, did you mean a code agent?"

Call `validate_dispatch` in `pub async fn run()` right before the task is inserted into the store. Print each warning as `[aid] Warning: ...` to stderr. Do NOT block dispatch — these are advisory warnings only.

Add 4 unit tests in a `#[cfg(test)] mod tests` block within run.rs (or the existing tests submodule if present) testing each warning case.

Context files:
- src/cmd/run.rs — the run function to modify (line 63 is the entry point)
- src/types.rs — RunArgs, AgentKind types
- src/agent/selection.rs — AgentKind::parse_str

Keep the function under 30 lines. Keep total file growth under 60 lines."""
worktree = "v80-validation"
context = ["src/cmd/run.rs:RunArgs,run", "src/types.rs:AgentKind"]

[[task]]
name = "structured-diff"
prompt = """Add structured diff output to `aid show <id> --json`.

Currently `task_json()` in src/cmd/show.rs returns task metadata + events but no diff information. Enhance it to include a `"diff"` field with structured data.

Add a `parse_diff_stat(diff_text: &str) -> Vec<serde_json::Value>` function in src/cmd/show_output.rs that parses `git diff --stat` output into structured entries. Each entry: `{"file": "path/to/file", "insertions": N, "deletions": N}`. Parse lines like ` src/foo.rs | 42 +++---` into file path, insertions count, deletions count.

Then in `task_json()` in src/cmd/show.rs:
1. Call `diff_stat()` to get the raw diff stat text
2. Parse it with `parse_diff_stat()`
3. Add `"diff_stat": [...]` and `"diff_summary": {"files_changed": N, "insertions": N, "deletions": N}` to the JSON payload

Add tests for `parse_diff_stat`:
- Standard diff stat line
- Binary file line (skip or mark as binary)
- Empty diff

Context files:
- src/cmd/show.rs — task_json function (line 79)
- src/cmd/show_output.rs — diff_stat, worktree_diff functions

Keep parse_diff_stat under 30 lines. Keep total file growth under 80 lines."""
worktree = "v80-structured-diff"
context = ["src/cmd/show.rs:task_json,ShowArgs", "src/cmd/show_output.rs:diff_stat,worktree_diff"]

[[task]]
name = "loop-detection"
prompt = """Add loop detection to the watcher to detect agents stuck in repetitive patterns.

In src/watcher.rs, the streaming watcher already has a HUNG_TIMEOUT (5 min no output). Add a complementary loop detector that catches agents producing output but making no progress.

Implementation:
1. Add a `LoopDetector` struct with:
   - `recent_events: VecDeque<String>` (last 20 event details, truncated to 100 chars)
   - `fn push(&mut self, detail: &str)` — adds to queue, drops oldest if > 20
   - `fn is_looping(&self) -> bool` — returns true if the last 10 events contain >= 8 duplicates (80% identical strings)

2. In `watch_streaming()`, after each event is recorded to store, push the event detail into the LoopDetector. If `is_looping()` returns true:
   - Record an event: event_type = "warning", detail = "Agent appears stuck in a loop — killing process"
   - Kill the child process
   - Set completion status to Failed
   - Return early

3. Add unit tests for LoopDetector:
   - Normal varied events → not looping
   - 10 identical events → looping
   - Mixed with some duplicates (< 80%) → not looping
   - Exact threshold test (8 of 10 identical) → looping

Put LoopDetector in a separate section at the bottom of watcher.rs (before #[cfg(test)] mod tests). Keep the struct + impl under 40 lines. Total file growth under 70 lines."""
worktree = "v80-loop-detect"
context = ["src/watcher.rs:watch_streaming,HUNG_TIMEOUT,CompletionInfo", "src/types.rs:TaskStatus,EventKind"]
