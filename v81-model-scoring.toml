# v8.1 — Model-Level Scoring
# Refactor agent selection to score agent+model pairs instead of just agent names.
# 8 tasks, 3 phases: data model → scoring logic → integration + tests

[defaults]
agent = "codex"
dir = "."
verify = "cargo check"

# Phase 1: Data model changes (parallel, no dependencies)

[[task]]
name = "model-capabilities"
prompt = """Add a `capability_score` field to `AgentModel` in src/cmd/config.rs.

Current struct at line 58:
```rust
pub struct AgentModel {
    pub agent: AgentKind,
    pub model: &'static str,
    pub input_per_m: f64,
    pub output_per_m: f64,
    pub tier: &'static str,
    pub description: &'static str,
}
```

Add a new field: `pub capability: i32` — a 1-10 score representing the model's general coding ability.

Update ALL entries in AGENT_MODELS (starting line 67) with appropriate capability scores:
- gpt-5.4: 10, gpt-4.1: 9, gpt-4.1-mini: 6, gpt-4.1-nano: 3
- gemini flash: 6, gemini pro: 9, gemini flash-lite: 3
- opencode glm-5: 7, kimi-k2.5: 7, mimo-v2-flash-free: 3, nemotron-free: 3, minimax-free: 3
- cursor auto: 8, cursor premium: 9, cursor opus-thinking: 10
- codebuff auto: 8
- kilo: 5

This is purely a data model addition — no logic changes. Keep changes minimal.

Add a test `model_capability_scores_are_populated` that checks all AGENT_MODELS entries have capability > 0."""
worktree = "v81-model-cap"
context = ["src/cmd/config.rs:AgentModel,AGENT_MODELS"]

[[task]]
name = "model-quality-fn"
prompt = """Add a `model_quality_score()` function in src/agent/selection_scoring.rs that computes a quality score from agent base score AND model capability.

The formula: `(base_score * 0.4) + (model_capability * 0.6)` — model capability has 60% weight since it's the bigger differentiator.

Function signature:
```rust
pub(super) fn model_quality_score(
    base_score: i32,
    model_capability: Option<i32>,
) -> f64 {
    let cap = model_capability.unwrap_or(5) as f64; // default 5 if unknown
    (base_score as f64 * 0.4) + (cap * 0.6)
}
```

Add 3 tests:
- High base + high cap → high score
- Low base + high cap → medium-high score (model compensates)
- High base + low cap → medium score (weak model drags down)

Keep function under 10 lines. Add it near the existing `cost_efficiency` function (line ~68)."""
worktree = "v81-quality-fn"
context = ["src/agent/selection_scoring.rs:base_score,cost_efficiency"]

# Phase 2: Scoring integration (depends on data model)

[[task]]
name = "wire-model-scoring"
prompt = """Wire model_quality_score into the agent selection pipeline in src/agent/selection.rs.

Current flow in `select_agent_from()` (line 32):
1. Classify prompt → category + complexity
2. For each available agent → compute base_score from AGENT_CAPABILITIES
3. Apply budget, history, rate-limit adjustments
4. Pick best candidate

Change step 2 to also consider model capability:
1. After computing base_score, look up the model that would be selected for this complexity (call `recommend_model`)
2. Find that model's capability score from AGENT_MODELS
3. Use `model_quality_score(base_score, Some(capability))` instead of raw base_score

In the Candidate struct (in selection_scoring.rs), the `score` field should now hold the model-weighted quality score.

Update the reason string to include model info: "research task (medium) → gemini/pro (score: 8.4)" instead of just "→ gemini (score: 9)".

IMPORTANT: The `Candidate` struct and `candidate_for` function are in src/agent/selection_scoring.rs. Both files need changes.

Do NOT break existing tests — the relative ordering should stay the same for most cases (codex still wins complex impl, gemini still wins research). Tests may need score value adjustments since scores are now f64 instead of i32.

Context files to read carefully:
- src/agent/selection.rs — select_agent_from, recommend_model
- src/agent/selection_scoring.rs — Candidate, candidate_for, base_score, pick_best_candidate
- src/cmd/config.rs — AgentModel, AGENT_MODELS, models_for_agent"""
worktree = "v81-wire-scoring"
depends_on = ["model-capabilities", "model-quality-fn"]
context = ["src/agent/selection.rs:select_agent_from,recommend_model,Candidate", "src/agent/selection_scoring.rs:candidate_for,base_score,Candidate,CandidateContext", "src/cmd/config.rs:AgentModel,models_for_agent"]

[[task]]
name = "update-selection-tests"
prompt = """Update the agent selection tests in src/agent/selection.rs (the #[cfg(test)] mod tests block, starting around line 223) to work with model-weighted scoring.

The tests currently check agent selection outcomes like "codex wins for complex impl", "gemini wins for research", "opencode wins for simple edits". These relative outcomes should NOT change — model scoring should refine, not reverse, the existing preferences.

If any test scores changed from i32 to f64, update the assertions. The test helper `select_agent_from()` returns `(String, String)` — the agent name and reason.

Add 2 new tests:
1. `model_capability_affects_selection_reason` — verify the reason string includes model name
2. `high_cap_model_boosts_weak_agent` — set up a scenario where a normally-weaker agent with a high-capability model beats a stronger agent with low-cap model (e.g., opencode/glm-5 vs kilo for simple edits when kilo has cap=5 and glm-5 has cap=7)

Run `cargo test` to verify ALL existing tests still pass. Fix any that break."""
worktree = "v81-selection-tests"
depends_on = ["wire-model-scoring"]
context = ["src/agent/selection.rs", "src/agent/selection_scoring.rs"]
verify = "cargo test"

# Phase 3: Display + docs (parallel after wiring)

[[task]]
name = "config-display"
prompt = """Update `aid config agents` display in src/cmd/config.rs to show model capability scores.

Find the `display_agents()` or equivalent function that renders agent information. Add a "Models" subsection for each agent showing model name, tier, capability score, and cost.

Example output format:
```
  codex (installed)
    Models: gpt-5.4 (premium, cap:10, $2.00/$8.00/M)
            gpt-4.1 (standard, cap:9, $2.00/$8.00/M)
            gpt-4.1-mini (cheap, cap:6, $0.40/$1.60/M)
```

Keep changes under 30 lines."""
worktree = "v81-config-display"
depends_on = ["model-capabilities"]
context = ["src/cmd/config.rs:AgentModel,AGENT_MODELS"]

[[task]]
name = "selection-reason-display"
prompt = """Update the auto-selection reason display in src/main.rs to show model info.

Currently at line 107:
```rust
eprintln!("[aid] Auto-selected agent: {selected} (reason: {reason})");
```

And at lines 114-116:
```rust
eprintln!("[aid] Auto-selected model: {name} (complexity: {})", profile.complexity.label());
```

Merge these two messages into a single, more informative line:
```
[aid] Auto-selected: codex/gpt-4.1 (reason: complex impl (medium) → codex/gpt-4.1, score: 8.4)
```

The reason string from `select_agent_with_reason` already contains model info after the wiring task. Just unify the two eprintln calls into one clean message.

Keep changes under 15 lines."""
worktree = "v81-reason-display"
depends_on = ["wire-model-scoring"]
context = ["src/main.rs:auto_model,Auto-selected"]

[[task]]
name = "update-readme-matrix"
agent = "opencode"
prompt = """Update the Agent Selection Guide table in README.md to mention model capability.

Find the capability matrix table (around line 580) that shows agents × task categories.

Add a note BELOW the table explaining that scores are further refined by model capability:

```
Scores above are per-agent baselines. When `auto` selects, it also factors in model capability (1-10 scale):
- **Premium models** (cap 9-10): gpt-5.4, gemini-pro, cursor opus-thinking
- **Standard models** (cap 6-8): gpt-4.1, gemini-flash, cursor-auto, opencode/glm-5
- **Budget models** (cap 3-5): gpt-4.1-nano, gemini-flash-lite, mimo-free

Final score = (agent_base × 0.4) + (model_capability × 0.6). Use `aid config agents` to see all model scores.
```

Keep the addition under 10 lines. Do NOT change the existing table."""
worktree = "v81-readme-model"
depends_on = ["model-capabilities"]

[[task]]
name = "research-models"
agent = "gemini"
prompt = "List all model options currently available for each AI CLI tool used by aid: codex (OpenAI), opencode (various providers), cursor (Anthropic/OpenAI), gemini (Google), kilo, codebuff. For each model, note its approximate capability tier (strong/medium/weak for coding tasks) and pricing if known. Focus on models released or updated in early 2026."
output = "/tmp/v81-model-research.md"
read_only = true
